<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Payment...</title>
    <!-- Cashfree SDK -->
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
</head>

<body
    style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #f8f9fa; font-family: sans-serif;">

    <div style="text-align: center;">
        <div class="loader"
            style="border: 4px solid #f3f3f3; border-top: 4px solid #FF3366; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 1rem;">
        </div>
        <h2 style="color: #333;">Redirecting to Payment...</h2>
        <p>Please do not close this window.</p>
    </div>

    <script>
        const cashfree = Cashfree({
            mode: "{{ env }}" === "TEST" ? "sandbox" : "production",
        });

        // My view passed 'TEST'. I should map it.
        // But assuming the view handles simple redirect usually, this is a fallback.
        // Let's just execute the payment component.

        cashfree.checkout({
            paymentSessionId: "{{ payment_session_id }}",
            redirectTarget: "_self" // Redirect to return_url configured in backend
        });
    </script>

    <style>
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</body>

</html>
