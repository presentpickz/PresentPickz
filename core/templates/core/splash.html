{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Present Pickz - Curated Joy, Every Gift</title>
    <meta name="google-site-verification" content="8iwAIBQlrjd3avbEZH-lT0Y8jDQR9m8koqZtk-7ediw" />
    <link rel="stylesheet" href="{% static 'css/splash.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Montserrat:wght@400;600;700&display=swap"
        rel="stylesheet">
    <meta name="description" content="Present Pickz - Curated Joy, Every Gift">
    <link rel="icon" type="image/jpg" href="{% static 'images/brand_logo.jpg' %}">
</head>

<body>
    <!-- Stars (generated by JS) -->
    <div class="stars-container" id="starsContainer"></div>

    <!-- Center Content -->
    <div class="splash-content">
        <div class="logo-wrapper">
            <img src="{% static 'images/brand_logo.jpg' %}" alt="Present Pickz" class="splash-logo">
        </div>

        <h1 class="brand-name">Present Pickz</h1>
        <p class="slogan">JUST PICK IT</p>

        <div class="loader"></div>
    </div>

    <script>
        // ── Star Field Generator ──
        const container = document.getElementById('starsContainer');

        // Small dot stars
        for (let i = 0; i < 70; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            const size = Math.random() * 3 + 1;
            s.style.width = size + 'px';
            s.style.height = size + 'px';
            s.style.animationDelay = (Math.random() * 4) + 's';
            s.style.animationDuration = (2 + Math.random() * 3) + 's';
            container.appendChild(s);
        }

        // Larger 4-pointed cross stars
        for (let i = 0; i < 12; i++) {
            const c = document.createElement('div');
            c.className = 'star-cross';
            c.style.left = Math.random() * 100 + '%';
            c.style.top = Math.random() * 100 + '%';
            const crossSize = 10 + Math.random() * 10;
            c.style.width = crossSize + 'px';
            c.style.height = crossSize + 'px';
            c.style.animationDelay = (Math.random() * 5) + 's';
            c.style.animationDuration = (3 + Math.random() * 3) + 's';
            container.appendChild(c);
        }

        // ── Redirect after splash (fast transition) ──
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.body.classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = '{% url "home" %}';
                }, 600);
            }, 2000);
        });
    </script>
</body>

</html>
